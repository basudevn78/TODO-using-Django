<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Todo</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'todo/styles/todo.css' %}">
</head>
<body class="update-page">
    <div class="container update-container">
        <h1>Update Todo</h1>
        <form action="" method="post">
            {% csrf_token %}
            <input type="text" name="title" id="title" value="{{ context.title }}" placeholder="Enter todo title...">
            <div class="button-group">
                <button type="submit" class="btn-update">Update</button>
                <a href="/" style="text-decoration: none; flex: 1; max-width: 200px;">
                    <button type="button" class="btn-cancel" onclick="window.history.back()">Cancel</button>
                </a>
            </div>
        </form>
    </div>
</body>
</html>
